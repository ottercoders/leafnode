name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-test \
            -p 4222:4222 -p 8222:8222 \
            nats:latest -js -m 8222
          for i in $(seq 1 10); do
            nc -z localhost 4222 && break || sleep 1
          done

      - name: Install dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd webview-ui && npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck extension
        run: npm run typecheck

      - name: Typecheck webview
        run: cd webview-ui && npm run check

      - name: Build webview
        run: npm run build:webview

      - name: Build extension
        run: npm run build:ext

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        uses: GabrielBB/xvfb-action@v1
        with:
          run: npm run test:e2e
        env:
          NATS_URL: nats://localhost:4222

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o leafnode.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: leafnode-vsix
          path: leafnode.vsix
          retention-days: 7

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: leafnode-vsix

      - name: Create release
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="build-${SHA_SHORT}"
          gh release create "$TAG" leafnode.vsix \
            --title "Build ${SHA_SHORT}" \
            --notes "Automated build from commit ${GITHUB_SHA}" \
            --target "$GITHUB_SHA" \
            --prerelease
        env:
          GH_TOKEN: ${{ github.token }}
