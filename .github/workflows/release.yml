name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd webview-ui && npm ci

      - name: Build
        run: npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm version "$VERSION" --no-git-tag-version

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o "leafnode-${VERSION}.vsix"

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies -i "leafnode-${VERSION}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish "leafnode-${VERSION}.vsix" -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Attach VSIX to GitHub Release
        run: gh release upload "$GITHUB_REF_NAME" "leafnode-${VERSION}.vsix"
        env:
          GH_TOKEN: ${{ github.token }}
